name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20.x'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm run test:run

            - name: Build
              run: npm run build

            - name: Verify build artifact is up to date
              run: |
                  if ! git diff --quiet -- index.js; then
                    echo "::error::index.js is out of date. Run 'npm run build' and commit the result."
                    git diff -- index.js | head -80
                    exit 1
                  fi
