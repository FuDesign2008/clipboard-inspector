version: 2

updates:
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
      open-pull-requests-limit: 10
      labels:
          - 'dependencies'
      groups:
          eslint:
              patterns:
                  - 'eslint'
                  - '@eslint/*'
                  - 'eslint-*'
                  - 'typescript-eslint'
                  - 'globals'
          prettier:
              patterns:
                  - 'prettier'
                  - 'pretty-quick'
          react:
              patterns:
                  - 'react'
                  - 'react-dom'
                  - '@types/react'
                  - '@types/react-dom'
          testing:
              patterns:
                  - 'vitest'
                  - '@vitest/*'

    - package-ecosystem: 'github-actions'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'monday'
      open-pull-requests-limit: 5
      labels:
          - 'dependencies'
          - 'ci'
