[book]
title = "Clipboard Inspector 产品战略书"
authors = ["FuDesign2008"]
language = "zh"
description = "从0到1：Clipboard Inspector 产品战略、市场分析、竞争格局与发展路线图"
multilingual = false
src = "src"

[build]
build-dir = "book"
create-missing = false

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html]
default-theme = "navy"
additional-css = ["theme/custom.css"]
git-repository-url = "https://github.com/FuDesign2008/clipboard-inspector"
edit-url-template = "https://github.com/FuDesign2008/clipboard-inspector/edit/main/strategy/{path}"
site-url = "/clipboard-inspector/strategy/"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1

[output.html.print]
enable = true
